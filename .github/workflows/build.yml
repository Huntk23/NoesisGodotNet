name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Compile (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Godot.NET.Sdk compiles against NuGet-provided assemblies; the engine
      # itself is not required for a compile check.
      - name: Build
        run: dotnet build NoesisGodot.csproj -c Debug
